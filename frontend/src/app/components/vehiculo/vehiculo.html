<mat-card class="bg-black">
  <div class="p-6 bg-white, border-gray-200 rounded-lg shadow-sm">
    <mat-card-header class="bg-gray-200 h-13 justify-center">
      <mat-card-title class="font-extrabold! text-[1.5rem]!">Catálogo de Vehículos</mat-card-title>
    </mat-card-header>
    <mat-card-content class="relative overflow-x-auto shadow-sm sm:rounded-lg">

      <mat-expansion-panel hideToggle (opened)="panelFilterState.set(true)"
        (closed)="panelFilterState.set(false); onFilterClose();" class="mb-2! mt-2!">
        <mat-expansion-panel-header>
          <mat-panel-title> Filtrar - Click para {{panelFilterState() ? 'cerrar' : 'abrir'}} </mat-panel-title>
        </mat-expansion-panel-header>
        <mat-panel-description>
            <mat-form-field  class="example-full-width">
              <mat-label>Placa</mat-label>
              <input matInput [formField]="frmFilter.placa" (input)="onPlacaChange($event);">
            </mat-form-field>

            <mat-form-field class="example-full-width">
              <mat-label>Cédula del cliente</mat-label>
              <input id="cedula" matInput [formField]="frmFilter.cedula" (input)="onCedulaChange($event);">
            </mat-form-field>

        </mat-panel-description>
      </mat-expansion-panel>

      <table mat-table [dataSource]="dataSource()"
        class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">

        <!-- Columna Placa -->
        <ng-container matColumnDef="placa">
          <th mat-header-cell *matHeaderCellDef> Placa </th>
          <td mat-cell *matCellDef="let element"> {{element.placa}} </td>
        </ng-container>

        <!-- Columna Marca -->
        <ng-container matColumnDef="marca">
          <th mat-header-cell *matHeaderCellDef> Marca </th>
          <td mat-cell *matCellDef="let element"> {{element.marca}} </td>
        </ng-container>

        <!-- Columna Modelo -->
        <ng-container matColumnDef="modelo">
          <th mat-header-cell *matHeaderCellDef> Modelo </th>
          <td mat-cell *matCellDef="let element"> {{element.modelo}} </td>
        </ng-container>

        <!-- Columna Año -->
        <ng-container matColumnDef="anio">
          <th mat-header-cell *matHeaderCellDef> Año </th>
          <td mat-cell *matCellDef="let element"> {{element.anio}} </td>
        </ng-container>

        <!-- Columna Cliente -->
        <ng-container matColumnDef="nombre_cliente">
          <th mat-header-cell *matHeaderCellDef> Cliente </th>
          <td mat-cell *matCellDef="let element"> {{element.nombre_cliente}} </td>
        </ng-container>

        <!-- Columna Botonera -->
        <ng-container matColumnDef="botonera">
          <th mat-header-cell *matHeaderCellDef style="text-align: center;">

            <button mat-icon-button (click)="onCreate();"

              class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-10 py-0.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 cursor-pointer">
              <mat-icon class="font-bold!">add</mat-icon>
            </button>
          </th>
          <td mat-cell *matCellDef="let element">
            <div class="flex gap-1 justify-center">
              <button mat-icon-button color="primary" (click)="onInfo(element.id_vehiculo);"
                class="flex content-center items-center focus:outline-none text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-2 py-1 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 cursor-pointer"><mat-icon>info</mat-icon></button>
              <button mat-icon-button color="primary" (click)="onEdit(element.id_vehiculo);"
                class="flex content-center items-center focus:outline-none text-white bg-yellow-400 hover:bg-yellow-500 focus:ring-4 focus:ring-yellow-300 font-medium rounded-lg text-sm px-2 py-1  dark:focus:ring-yellow-900 cursor-pointer">
                <mat-icon>edit</mat-icon></button>
              <button mat-icon-button color="warn" (click)="onDelete(element.id_vehiculo);"
                class="flex content-center items-center focus:outline-none text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-2 py-1 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800 cursor-pointer "><mat-icon>delete</mat-icon></button>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="mostrarEncabezados"></tr>
        <tr mat-row *matRowDef="let row; columns: mostrarEncabezados;"></tr>

      </table>
    </mat-card-content>
  </div>
  <mat-card-footer class="flex justify-between p-3">
    <mat-paginator
        (page)="onPageChange($event)"
        [length]="totalRecords()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="[5, 10, 100]"
        aria-label="Select page">
    </mat-paginator>
    <div class="">
      <button matFab extended (click)="onPrint();">
        Imprimir <mat-icon>printer</mat-icon>
      </button>
    </div>

  </mat-card-footer>
</mat-card>
