<h2 mat-dialog-title class="py-5! text-center font-bold!">Cambiar estado de la orden</h2>
<mat-divider class="border-2"></mat-divider>
<mat-dialog-content>
  <form id="frmEstadoOrden" [formGroup]="miForm" (ngSubmit)="onGuardar()">
    <div class="flex flex-col">

      <mat-form-field>
        <mat-label>Estado</mat-label>
        <mat-select formControlName="estado">
          @for(e of estados; track e.valor){
            <mat-option [value]="e.valor">{{e.etiqueta}}</mat-option>
          }
        </mat-select>
      </mat-form-field>

    </div>
  </form>
</mat-dialog-content>
<mat-divider class="border-2"></mat-divider>
<mat-dialog-actions class="py-5!">
  <button matFab extended color="primary" type="submit" form="frmEstadoOrden" [disabled]="miForm.invalid"><mat-icon>save</mat-icon>Guardar</button>
  <button matFab extended color="warn" [mat-dialog-close]="false"><mat-icon>cancel</mat-icon>Cancelar</button>
</mat-dialog-actions>
