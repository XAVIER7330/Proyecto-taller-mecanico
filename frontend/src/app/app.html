<section class="flex">
    <mat-toolbar class="header" [hidden]="!this.authService.isLoggedIn()">
        <button matIconButton class="botonMenu" (click)="sidenav.toggle();"
        [matTooltip]="sidenav.opened ? 'Cerrar menú' : 'Abrir menú'">
            <mat-icon>menu</mat-icon>

        </button>

        <div class="me-4 flex">
            <button mat-icon-button class="botonMenu" [matMenuTriggerFor]="menu">
                <mat-icon>person</mat-icon>
            </button>
        </div>
        <mat-menu #menu="matMenu">
            <button mat-menu-item [routerLink]="['/login']" [hidden]="this.authService.isLoggedIn()">Iniciar sesión</button>
            <button mat-menu-item (click)="logout()">Cerrar sesión</button>
            <mat-divider></mat-divider>
            <button mat-menu-item>Cambiar contraseña</button>
        </mat-menu>

    </mat-toolbar>

    <mat-sidenav-container class="container">
        <mat-sidenav #sidenav mode="side" [opened]="this.authService.isLoggedIn()" class="sidenav">
            <mat-nav-list>
                @for(
item of menuItems(); track item.label){
              <mat-list-item>
                 <a href="" [routerLink]="[item.route]">
                     <mat-icon>{{item.icon}}</mat-icon> 
                     {{item.label}}
                    </a>
                    </mat-list-item>
                }
                
            </mat-nav-list>
        </mat-sidenav>
        <mat-sidenav-content>
            
           
            <router-outlet />

        </mat-sidenav-content>

    </mat-sidenav-container>

    <mat-toolbar class="footer">
        <span class="font-bold text-[14px]">@2026 Taller Mecánico. todos los derechos reservados.</span>
    </mat-toolbar>
</section>
